<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحه پیدا نشد - Blue Pyramid</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Vazirmatn:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --deep: #050d1a;
      --blue: #1e6fff;
      --cyan: #4da6ff;
      --glow: #4d9fff;
      --silver: #b8c5d6;
      --white: #ffffff;
    }
    body {
      background: var(--deep);
      color: var(--white);
      font-family: 'Vazirmatn', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .error-container {
      text-align: center;
      max-width: 600px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--glow), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      font-family: 'Cinzel', serif;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: var(--white);
      font-family: 'Cinzel', serif;
    }
    p {
      color: var(--silver);
      margin-bottom: 30px;
      font-size: 1.1rem;
      line-height: 1.8;
    }
    .error-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      padding: 12px 28px;
      background: rgba(77,159,255,0.15);
      color: var(--glow);
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid rgba(77,159,255,0.3);
      transition: all 0.3s;
      font-weight: 600;
      letter-spacing: 1px;
    }
    a:hover {
      background: rgba(77,159,255,0.25);
      border-color: var(--glow);
    }
    .animation {
      margin: 40px 0;
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @media (max-width: 600px) {
      .error-code { font-size: 4rem; }
      h1 { font-size: 1.8rem; }
      .error-actions { flex-direction: column; }
      a { width: 100%; }
    }
  </style>
</head>
<body>

<div class="error-container">
  <div class="error-code">۴۰۴</div>
  <div class="animation">▲</div>
  <h1>صفحه پیدا نشد</h1>
  <p>متأسفانه صفحه‌ای که دنبالش می‌گردید وجود ندارد یا منتقل شده است.</p>
  
  <div class="error-actions">
    <a href="/">بازگشت به خانه</a>
    <a href="/about.html">درباره ما</a>
  </div>
</div>

</body>
</html>
